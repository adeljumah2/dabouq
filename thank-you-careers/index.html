<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted | Dabouq Group</title>
    <link rel="icon" href="/assets/logo.png" type="image/png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <script>(function(){var l=localStorage.getItem('dabouq-lang')||'en';document.documentElement.lang=l;document.documentElement.dir=l==='ar'?'rtl':'ltr';if(l==='ar')document.documentElement.classList.add('lang-ar');})();</script>
</head>
<body>

    <header class="site-header scrolled" id="header" style="position: absolute;">
        <nav class="nav-container">
            <a href="/"><img src="/assets/logo.png" alt="Dabouq Group" class="logo-img logo-dark"><img src="/assets/logo-white.png" alt="" class="logo-img logo-light" aria-hidden="true"></a>
            <div class="lang-switch" role="group" aria-label="Language">
                <button type="button" class="lang-btn" data-lang="en" aria-pressed="true">EN</button>
                <button type="button" class="lang-btn" data-lang="ar" aria-pressed="false">ع</button>
            </div>
        </nav>
    </header>

    <div class="thankyou-page">
        <div class="thankyou-card reveal visible">
            <div class="thankyou-icon">
                <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            </div>
            <h1 data-i18n="thanks.careers.title">Application Submitted.</h1>
            <p data-i18n="thanks.careers.desc">Your profile has been securely transmitted. Our Talent Acquisition team will review it and respond shortly.</p>
            <a href="/" class="btn-primary" style="width: 100%; justify-content: center;" data-i18n="thanks.home">Return Home</a>
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <p class="redirect-text" data-i18n="thanks.redirect">Redirecting automatically</p>
        </div>
    </div>

    <footer class="site-footer site-footer--compact">
        <div class="footer-map" data-i18n-aria="footer.map" aria-label="Regional presence map">
            <div id="regional-map"></div>
            <div class="footer-map-fade" aria-hidden="true"></div>
        </div>
    </footer>

    <script>setTimeout(() => { window.location.href = '/'; }, 5000);</script>
    <script src="/js/i18n.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/js/map.js"></script>
</body>
</html>
